<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        background: #fff;
        width: 70%;
        max-width: 800px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 10px;
        color: #333;
    }

    .progress-bar {
        height: 8px;
        background: #ddd;
        border-radius: 10px;
        margin-bottom: 20px;
        overflow: hidden;
    }

    .progress {
        height: 100%;
        width: 0%;
        background: #4e73df;
        transition: 0.4s;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #4e73df;
        outline: none;
    }

    .row {
        display: flex;
        gap: 15px;
    }

    .row .form-group {
        flex: 1;
    }

    .gender-options {
        display: flex;
        gap: 20px;
    }

    .gender-options input {
        width: auto;
    }

    .btn {
        background: #4e73df;
        color: #fff;
        padding: 12px;
        border: none;
        width: 100%;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #2e59d9;
    }

    .photo-preview {
        text-align: center;
        margin-top: 10px;
    }

    .photo-preview img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        display: none;
        border: 2px solid #4e73df;
    }

    .hidden {
        display: none;
    }

    @media(max-width: 600px) {
        .row {
            flex-direction: column;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h2>Student Registration Form</h2>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <form id="registrationForm">

        <!-- Personal Information -->
        <h3>Personal Information</h3>

        <div class="row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" required>
            </div>
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" required> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>
        </div>

        <!-- Academic Details -->
        <h3>Academic Information</h3>

        <div class="form-group">
            <label>Course</label>
            <select id="course" required>
                <option value="">Select Course</option>
                <option>B.Tech</option>
                <option>B.Sc</option>
                <option>BBA</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group hidden" id="otherCourseDiv">
            <label>Specify Course</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Year of Study</label>
            <select required>
                <option value="">Select Year</option>
                <option>1st Year</option>
                <option>2nd Year</option>
                <option>3rd Year</option>
                <option>4th Year</option>
            </select>
        </div>

        <!-- Account Details -->
        <h3>Account Setup</h3>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
            <input type="checkbox" onclick="togglePassword()"> Show Password
        </div>

        <div class="form-group">
            <label>Upload Profile Photo</label>
            <input type="file" accept="image/*" onchange="previewPhoto(event)">
            <div class="photo-preview">
                <img id="photo">
            </div>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" required> I agree to Terms & Conditions
            </label>
        </div>

        <button type="submit" class="btn">Register</button>
    </form>
</div>

<script>
    const form = document.getElementById("registrationForm");
    const progress = document.getElementById("progress");
    const inputs = form.querySelectorAll("input, select, textarea");

    form.addEventListener("input", () => {
        let filled = 0;
        inputs.forEach(input => {
            if (input.value) filled++;
        });
        let percentage = (filled / inputs.length) * 100;
        progress.style.width = percentage + "%";
    });

    document.getElementById("course").addEventListener("change", function() {
        const otherDiv = document.getElementById("otherCourseDiv");
        if (this.value === "Other") {
            otherDiv.classList.remove("hidden");
        } else {
            otherDiv.classList.add("hidden");
        }
    });

    function togglePassword() {
        const password = document.getElementById("password");
        password.type = password.type === "password" ? "text" : "password";
    }

    function previewPhoto(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const img = document.getElementById("photo");
            img.src = reader.result;
            img.style.display = "block";
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    form.addEventListener("submit", function(e){
        e.preventDefault();
        alert("Registration Successful!");
    });
</script>

</body>
</html>
