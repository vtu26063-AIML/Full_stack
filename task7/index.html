<!DOCTYPE html><html><head><title>Feedback Form</title><link rel='stylesheet' href='style.css'></head><body><form class='card'><h1>Feedback</h1><input id='name' placeholder='Name' onkeypress='validateText(event)' onmouseover='hoverField(this)' onmouseout='unhoverField(this)'><input id='email' placeholder='Email' onkeypress='validateText(event)' onmouseover='hoverField(this)' onmouseout='unhoverField(this)'><textarea id='feedback' placeholder='Enter feedback' onmouseover='hoverField(this)' onmouseout='unhoverField(this)'></textarea><button type='button' ondblclick='submitForm()'>Double Click to Submit</button><p id='msg'></p></form><script src='script.js'></script></body></html>
