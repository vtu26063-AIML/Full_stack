<!DOCTYPE html>
<html>
<head>
    <title>Interactive Feedback Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        .form-container {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, textarea {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
            border: 2px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        .error {
            color: red;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>Customer Feedback Form</h2>

    <form id="feedbackForm">

        <input type="text" id="name" placeholder="Enter your name"
            onkeypress="validateName(event)"
            onmouseover="highlight(this)"
            onmouseout="removeHighlight(this)">
        <div id="nameError" class="error"></div>

        <input type="email" id="email" placeholder="Enter your email"
            onkeypress="validateEmail(event)"
            onmouseover="highlight(this)"
            onmouseout="removeHighlight(this)">
        <div id="emailError" class="error"></div>

        <textarea id="message" placeholder="Enter your feedback"
            onmouseover="highlight(this)"
            onmouseout="removeHighlight(this)"></textarea>

        <button type="button" ondblclick="submitForm()">Submit (Double Click)</button>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
